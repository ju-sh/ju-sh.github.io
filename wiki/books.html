<h3 id="factorization-example">Factorization example</h3>
<p>(All numbers are in binary.)</p>
<p>Given a number: z = zₘ₊ₙ;zₘ₊ₙ₋₁;….;z₂;z₁</p>
<p>are there two numbers:</p>
<ul>
<li>a = zₙ;zₘ₊ₙ₋₁;….;z₂;z₁</li>
<li>b = zₘ;zₘ₊ₙ₋₁;….;z₂;z₁</li>
</ul>
<p>such that a*b = z</p>
